      hibernate:
        format_sql: true
api:
  base-url: http://172.31.225.146:8881
sync:
  frequencies:
    BaseUser: "0 0 * * * *" // 每小时同步一次
    EmrPatientInfo: "0 */5 * * * *"
    EmrActivityInfo: "0 * * * * *" // 每1分钟同步一次
    EmrInfReport: "0 */5 * * * *"
    EmrOutpatientRecord: "0 */5 * * * *"
    EmrOutpatientObs: "0 */5 * * * *"
    EmrAdmissionInfo: "0 */5 * * * *"
    EmrFirstCourse: "0 */5 * * * *"
    EmrDailyCourse: "0 */5 * * * *"
    EmrAdmissionRecord: "0 */5 * * * *"
    EmrDischargeInfo: "0 */5 * * * *"
    EmrExClinical: "0 */5 * * * *"
    EmrExClinicalItem: "0 */5 * * * *"
    EmrExLab: "0 */5 * * * *"
    EmrExLabItem: "0 */5 * * * *"
    EmrOrder: "0 */5 * * * *"
    EmrOrderItem: "0 */5 * * * *"
    EmrDeathInfo: "0 */5 * * * *"
    EmrVitalSignsRecord: "0 */5 * * * *"
