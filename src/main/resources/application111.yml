server:
  port: 80
spring:
  application:
    name: epinet
  graphql:
    schema:
      inspection:
        enabled: true
    graphiql:
      enabled: true
    path: /graphql
#      locations: classpath:/graphql/
  datasource:
    base:
      jdbc-url: jdbc:mysql://localhost:3306/epi?useSSL=false&serverTimezone=UTC
      username: root
      password: Admin@123
      driver-class-name: com.mysql.cj.jdbc.Driver
    view:
      jdbc-url: jdbc:mysql://localhost:3306/epi?useSSL=false&serverTimezone=UTC
      username: root
      password: Admin@123
      driver-class-name: com.mysql.cj.jdbc.Driver
