<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <title>数据同步管理中台</title>
    <link rel="stylesheet" href="index.css">
    <script src="vue.global.js"></script>
    <script src="axios.min.js"></script>
    <script src="index.full.js"></script>
    <script src="index.iife.min.js"></script>
    <script src="zh-cn.js"></script>
    <style>
        body {
            margin: 0;
            font-family: Helvetica, sans-serif;
        }

        .layout-container {
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .header {
            background: #409EFF;
            color: white;
            line-height: 60px;
            padding: 0 20px;
            font-size: 20px;
            font-weight: bold;
        }

        .aside {
            background: #304156;
            color: white;
            width: 220px;
        }

        .el-menu {
            border-right: none;
        }

        .el-menu-item.is-active {
            background-color: #409EFF !important;
        }
    </style>
</head>

<body>
    <div id="app">
        <el-container class="layout-container">
            <el-header class="header">数据对接控制台</el-header>

            <el-container>
                <el-aside class="aside">
                    <el-menu :default-active="activePath" active-text-color="#ffd04b" background-color="#304156"
                        text-color="#fff" @select="handleSelect" :collapse="isCollapsed" unique-opened>
                        <template v-for="menu in menuList" :key="menu.path">
                            <el-sub-menu v-if="menu.children?.length" :index="menu.path">
                                <template #title>
                                    <el-icon v-if="menu.icon">
                                        <component :is="menu.icon" />
                                    </el-icon>
                                    <span>{{ menu.name }}</span>
                                </template>
                                <el-menu-item v-for="child in menu.children" :key="child.path" :index="child.path">
                                    <el-icon v-if="child.icon">
                                        <component :is="child.icon" />
                                    </el-icon>
                                    <span>{{ child.name }}</span>
                                </el-menu-item>
                            </el-sub-menu>
                            <el-menu-item v-else :index="menu.path">
                                <el-icon v-if="menu.icon">
                                    <component :is="menu.icon" />
                                </el-icon>
                                <span>{{ menu.name }}</span>
                            </el-menu-item>
                        </template>
                    </el-menu>
                </el-aside>

                <el-main class="main" style="padding:0; overflow:hidden;">
                    <iframe id="contentFrame" :src="currentContentUrl" frameborder="0"
                        style="width:100%; height:100%; border:none;"></iframe>
                </el-main>
            </el-container>
        </el-container>
    </div>

    <script>
        const { createApp, ref, onMounted } = Vue;

        const app = createApp({
            setup() {
                const menuList = ref([]);
                const currentContentUrl = ref('welcome.html');

                const activePath = ref(location.pathname);
                const isCollapsed = ref(false);


                // 图标映射（可根据后端返回的icon字符串动态匹配）
                const iconMap = {
                    'edit': 'Edit',
                    'refresh': 'Refresh',
                    'dictionary': 'Collection',
                    'log': 'Document',
                    // ... 更多图标
                };

                const loadMenus = async () => {
                    // 直接请求，不处理任何错误
                    const res = await axios.get('http://localhost:8080/emr/dic');

                    // 把接口返回的分类，变成子菜单
                    const dictChildren = res.data.map(item => ({
                        name: item.name,
                        path: `/dict-edit.html?currentCategoryName=${item.name}&category=${item.code}`,
                        icon: ''
                    }));

                    // 直接赋值给菜单列表
                    menuList.value = [
                        {
                            name: "概览",
                            path: "/welcome.html",
                            icon: "Collection",
                        },
                        {
                            name: "字典映射配置",
                            path: "/dict",
                            icon: "Edit",
                            children: dictChildren
                        },
                        {
                            name: "科室同步",
                            path: "/dept-edit.html",
                            icon: "Folder"
                        },
                        {
                            name: "接口同步日志",
                            path: "/logs.html",
                            icon: "Refresh"
                        }
                    ];
                };

                const handleSelect = (path) => {
                    currentContentUrl.value = path;
                    console.log('当前路径:', document.querySelector('#contentFrame').src);
                };

                onMounted(() => {
                    loadMenus();
                    // 可选：监听窗口大小自动折叠
                    // window.addEventListener('resize', ...);
                });

                return {
                    menuList,
                    activePath,
                    isCollapsed,
                    handleSelect,
                    currentContentUrl
                };
            }
        });
        for (const [key, component] of Object.entries(ElementPlusIconsVue)) {
            app.component(key, component);
        }
        // // 关键：传入中文 locale
        // app.use(ElementPlus, {
        //     locale: ElementPlusLocaleZhCn   // 注意：脚本引入后，这个全局变量会自动出现
        // });
        app.use(ElementPlus).mount('#app');
    </script>
</body>

</html>
